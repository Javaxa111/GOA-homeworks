<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimo Store</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <header class="header">
        <div class="logo">Minimo.</div>
        <nav class="nav">
            <a href="#">მთავარი</a>
            <a href="#">კოლექცია</a>
            <a href="#">კონტაქტი</a>
        </nav>
        <div class="cart">🛒 (0)</div>
    </header>

    <section class="hero">
        <h1>ახალი კოლექცია</h1>
        <p>აღმოაჩინ</p>
    </section>

    <main class="main-content">
        <div class="grid">
            
            <div class="card">
                <div class="img-box bg-blue">👕</div>
                <div class="info">
                    <h3>მაიკა</h3>
                    <p class="price">45 ₾</p>
                    <button class="btn">ყიდვა</button>
                </div>
            </div>

            <div class="card">
                <div class="img-box bg-green">🕶️</div>
                <div class="info">
                    <h3>მზის სათვალე</h3>
                    <p class="price">85 ₾</p>
                    <button class="btn">ყიდვა</button>
                </div>
            </div>

            <div class="card">
                <div class="img-box bg-purple">🎒</div>
                <div class="info">
                    <h3>ზურგჩანთა</h3>
                    <p class="price">120 ₾</p>
                    <button class="btn">ყიდვა</button>
                </div>
            </div>

            <div class="card">
                <div class="img-box bg-orange">👟</div>
                <div class="info">
                    <h3>სპორტული ფეხსაცმელი</h3>
                    <p class="price">199 ₾</p>
                    <button class="btn">ყიდვა</button>
                </div>
            </div>

        </div>
    </main>


</body>
</html>
