<body>

  <!-- 
  section tag:
  გამოიყენება კონტენტის თემებად ან ნაწილებად დასაყოფად.
  -->
  <section>
    <h2>პროგრამირება</h2>

    <!-- 
    article tag:
    გამოიყენება დამოუკიდებელი კონტენტისთვის
   
    -->
    <article>
      <h3>HTML</h3>
      <p>
        HTML არის ვებ-გვერდების სტრუქტურის შექმნის ენა.
      </p>
    </article>

  </section>

  <!-- 
  aside tag:
  გამოიყენება დამატებითი ინფორმაციისთვის,
  რომელიც დაკავშირებულია მთავარ კონტენტთან
  -->
  <aside>
    <h4>დამატებითი ინფორმაცია</h4>
    <p>
      HTML გამოიყენება CSS-თან და JavaScript-თან ერთად.
    </p>
  </aside>

</body>
