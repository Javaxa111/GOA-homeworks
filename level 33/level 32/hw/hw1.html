<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Preview Card</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <article class="blog-card">
        <img src="images (1).jpg" alt="ბლოგის ილუსტრაცია" class="main-img">

        <div class="content">
            <span class="category">Learning</span>
            <p class="publish-date">Published 21 Dec 2023</p>
            <h1 class="title">HTML & CSS foundations</h1>
            <p class="description">
                These languages are the backbone of every website, defining structure, content, and presentation.
            </p>
        </div>

        <div class="author">
            <img src="images (1).jpg" alt="Greg Hooper" class="avatar">
            <span class="author-name">Greg Hooper</span>
        </div>
    </article>

</body>
</html>
