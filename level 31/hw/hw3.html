<!--CSS Box Model-ის შრეები

Content (შინაარსი): ადგილი, სადაც მოთავსებულია ტექსტი, სურათი ან ვიდეო.

Padding (შიდა დაშორება): სივრცე კონტენტსა და ჩარჩოს შორის.

Border (ჩარჩო): ხაზი, რომელიც გარს აკრავს პედინგს და კონტენტს.

როგორ მუშაობს:
Margin (გარე დაშორება): ცარიელი სივრცე ჩარჩოს გარეთ, რომელიც აშორებს ელემენტს სხვა ელემენტებისგან.

Padding (შიდა): ის ზრდის ელემენტის შიდა მოცულობას. თუ ელემენტს აქვს ფონის ფერი, პედინგიც ამ ფერში იქნება. იგი გამოიყენება იმისთვის, რომ ტექსტი ან სურათი არ იყოს ახლოს ჩარჩოზე.

Margin (გარე): ის ქმნის სივრცეს ელემენტის გარეთ. მარჯინი აის გამჭვირვალე და გამოიყენება ელემენტებს შორის დისტანციის დასაცავად
