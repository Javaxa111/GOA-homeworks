<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <title>Frontend Mentor | NFT preview card component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <article class="nft-card">
    
    <div class="img-container">
      <img src="./images/image-equilibrium.jpg" alt="Equilibrium NFT" class="main-img">
      
    </div>

    <h1 class="title">Equilibrium #3429</h1>
    <p class="description">Our Equilibrium collection promotes balance and calm.</p>

    <div class="stats-row">
      <div class="price">
        <img src="./images/icon-ethereum.svg" alt="Ethereum">
        <span>0.041 ETH</span>
      </div>
      <div class="time">
        <img src="./images/icon-clock.svg" alt="Clock">
        <span>3 days left</span>
      </div>
    </div>

    <hr class="divider">

    <footer class="creator-section">
      <img src="./images/image-avatar.png" alt="Jules Wyvern" class="avatar">
      <p class="creator-text">Creation of <span>Jules Wyvern</span></p>
    </footer>

  </article>

</body>
</html>
