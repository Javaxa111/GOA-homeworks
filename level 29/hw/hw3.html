<!DOCTYPE html>
<html>
<head>
<style>

table {
  border-collapse: collapse;
  width: 60%;
}

th {
  background-color: orange;
  color: black;
  border: 3px solid green;
  padding: 10px;
}

td {
  border: 3px solid green;
  text-align: center;
  padding: 10px;
}

</style>
</head>
<body>

<table>
  <tr>
    <th>Name</th>
    <th>Age</th>
    <th>Salary</th>
  </tr>
  <tr>
    <td>JACOB</td>
    <td>24</td>
    <td>20,000</td>
  </tr>
  <tr>
    <td>John</td>
    <td>32</td>
    <td>35,000</td>
  </tr>
  <tr>
    <td>Chris</td>
    <td>27</td>
    <td>32,000</td>
  </tr>
</table>

</body>
</html>
