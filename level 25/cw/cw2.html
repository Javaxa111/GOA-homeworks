<!-- Internal CSS არის CSS-ის ტიპი, რომელიც იწერება HTML ფაილში <style> თეგის შიგნით -->

<!-- ის გამოიყენება მაშინ, როცა გვინდა ერთ კონკრეტულ გვერდზე ყველა ელემენტი გავსტილოთ -->

<!-- ვიყენებთ მაშინ, როცა:
- ვმუშაობთ ერთ HTML ფაილზე
- გვჭირდება რამდენიმე ელემენტზე ერთნაირი სტილი
-->

<!DOCTYPE html>
<html>
<head>
  <style>
    p {
      color: blue;
      font-size: 18px;
      text-align: center;
    }
  </style>
</head>
<body>

  <p>პარაგრაფი 1</p>
  <p>პარაგრაფი 2</p>
  <p>პარაგრაფი 3</p>
  <p>პარაგრაფი 4</p>
  <p>პარაგრაფი 5</p>

</body>
</html>
