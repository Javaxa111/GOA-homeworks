<!-- CSS  არის პროგრმაირების ენა, რომელიც გამოიყენება ვებსაიტის დიზაინისთვის -->
<!-- მისი საშუალებით ვცვლით ფერს, ზომას და სხვა -->

<!-- Inline CSS არის CSS-ის ტიპი, რომელიც იწერება პირდაპირ HTML ელემენტში style ატრიბუტის გამოყენებით -->

<!-- Inline CSS ვიყენებთ მაშინ, როცა გვჭირდება კონკრეტული ელემენტის სწრაფი და ერთჯერადი გასტილვა -->

<!DOCTYPE html>
<html>
<head>
  <title>Inline CSS Example</title>
</head>
<body>

  <p style="color: blue; background-color: aqua;">asdfghjk</p>

  <p style="color: red; font-size: 18px;">
    qwertyui
  </p>

  <p style="background-color: yellow; padding: 10px;">
   zxcvbn
  </p>

  <p style="background-color: green; color: rgb(80, 10, 10);  padding: 10px;">
    sexdfbhj
  </p>

  <p style="color: purple; border: 2px solid black;">
    ghjkl;
  </p>

</body>
</html>


<!-- დადებითი ისაა რომ მარტივი და სწრაფი გამოსაყენებელია, უცბად შეგიძლია გასტილო-->

<!-- უარყოფითი ისაა რომ დიდ მასალაზე ერთიანად ვერ გამოიყენებ,
  ანუ ცალ-ცალკე გიწევს თითოეულის დაწერა რაც დამღლელია და ამავდროულად ბევრ დროს წაიღებს-->
