<!DOCTYPE html>
<html>
<head>
    <title>Div Example</title>

    <style>
     
        div {
            background-color: lightblue;
            text-align: center;
            
        }

    
        h1 {
            color: darkblue;
            
        }

        
        img {
            width: 200px;
            height: 150px;
            border-radius: 10px;
            border: 3px solid black;
        }

      
        .same-style {
            color: white;
            background-color: purple;
        }
    </style>
</head>
<body>

    <div>
        <h1>My Web Page</h1>
        <p class="same-style">qwertyu</p>
        <img src="0000_27084609-8a6e-48e3-8349-5551cc3c30d5_1024x1024 (1).webp" >
        <button class="same-style">asdfgh</button>
    </div>

</body>
</html>
