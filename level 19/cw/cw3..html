<!-- <table> : ცხრილის მთავარი კონტეინერი, რომელიც აერთიანებს ყველადანარჩენს. 

<thead> : ცხრილის ზედა ნაწილი, სადაც სათაურებია. 

<tbody> : ცხრილის ძირითადი ნაწილი, რომელიც აჯგუფებს მონაცემებს და მათ სტირქონებს. 

<tr> (Table Row) : განსაზღვრავს ცხრილის ერთ ჰორიზონტალურ როგს

<th> (Table Header) : სათაურის უჯრა 

<td> (Table Data) : სტანდარტული უჯრა, რომელიც შეიცავს უშუალოდ მონაცემებს (ტექსტს, ციფრებს და ა.შ.). 

colspan : ატრიბუტი, რომელიც საშუალებას აძლევს ერთ უჯრას დაიკავოს რამდენიმე სვეტი ჰორიზონტალურად. 

rowspan : ატრიბუტი, რომელიც საშუალებას აძლევს ერთ უჯრას დაიკავოს რამდენიმე სტრიქონი ვერტიკალურად.
