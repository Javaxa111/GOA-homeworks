```html
<!DOCTYPE html>
<html>
<head>
<title>CSS Buttons Example</title>


</head>

<body style="background-color:#dcdcdc; font-family:Times New Roman; padding:20px;">

<h1>Buttons in CSS</h1>

<button style="padding:3px 8px;">
Button
</button>

<button style="
background-color:orange;
color:white;
border:2px solid #cc7a00;
padding:4px 10px;
margin-left:5px;
">
New Button1
</button>

<button style="
background-color:red;
color:white;
border:3px solid black;
padding:6px 14px;
font-size:20px;
margin-left:5px;
">
New Button2
</button>

<br><br><br>

<h2>Button Borders in CSS</h2>

<button style="padding:3px 8px;">
Button
</button>

<button style="
border:2px solid orange;
background-color:white;
padding:4px 10px;
margin-left:5px;
">
New Button1
</button>

<button style="
border:3px dashed red;
background-color:white;
padding:4px 10px;
margin-left:5px;
">
New Button2
</button>

<button style="
border:3px solid blue;
background-color:white;
padding:4px 10px;
margin-left:5px;
">
New Button3
</button>

<br><br><br>

<h1 style="
color:blue;
font-size:42px;
font-weight:bold;
">
We can apply Inline CSS on this heading.
</h1>

<p style="font-size:18px;">
Here is the paragraph.
</p>

</body>
</html>
