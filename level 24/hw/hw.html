<!-- 
INLINE CSS
Inline CSS იწერება პირდაპირ HTML ელემენტში style ატრიბუტის გამოყენებით.
მაგალითი:
<h1 style="color:blue;">Heading</h1>
ის მოქმედებს მხოლოდ იმ ელემენტზე სადაც არის გამოყენებული.

INTERNAL CSS
Internal CSS იწერება <style> თეგში head ნაწილში.
მაგალითი:

<style>
h1{
color:blue;
}
</style>

ის მოქმედებს მხოლოდ იმ HTML გვერდზე სადაც წერია.

EXTERNAL CSS
External CSS არის ცალკე .css ფაილი.
HTML უკავშირდება მას link თეგით.

მაგალითი:
<link rel="stylesheet" href="style.css">

განსხვავება:

Inline CSS
✔ პატარა მაგალითებისთვის
✔ სწრაფი
❌ არ არის კარგი დიდი პროექტისთვის

Internal CSS
✔ ერთი გვერდის სტილებისთვის

External CSS
✔ საუკეთესო დიდი საიტებისთვის
✔ ერთ CSS ფაილს ბევრი გვერდი იყენებს
-->
