<!--CSS დამატებითი კუთვნილებების განმარტება:

1. display: flex; 
   - დანიშნულება: ელემენტების კონტეინერში მოქნილად განლაგება. ელემენტების გვერდიგვერდ დასასმელად.

2. justify-content: space-between;
   - დანიშნულება: Flex კონტეინერში ელემენტებს შორის მაქსიმალური თავისუფალი სივრცის გადანაწილება.

3. align-items: center;
   - დანიშნულება: ელემენტების ვერტიკალური გასწორება (ცენტრირება) კონტეინერის შიგნით.

4. transition: background-color 0.4s;
   - დანიშნულება: განსაზღვრავს, თუ რა დროში უნდა მოხდეს სტილის ცვლილება (მაგ. ფერის შეცვლა მაუსის მიტანისას უფრო რბილი ხდება).

5. 
6. box-shadow: 0 10px 20px rgba(0,0,0,0.2);
   - დანიშნულება: ელემენტისთვის ჩრდილის დამატება
7. border-radius: 15px;
   - დანიშნულება: ელემენტის (სურათის, ღილაკის) მართკუთხა კუთხეების დამრგვალება.

8. gap: 20px;
   - დანიშნულება: Flex ან Grid განლაგების დროს ელემენტებს შორის ცარიელი სივრცის (დაშორების) შექმნა. -->
