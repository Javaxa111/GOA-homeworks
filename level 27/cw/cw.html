<!DOCTYPE html>
<html lang="en">
<body>

    <!-- 
        1) RGB
        RGB ნიშნავს Red, Green, Blue.
        ეს არის ფერების მოდელი, სადაც ფერი იქმნება
        წითელი, მწვანე და ლურჯი ფერების შერევოით.

        
        rgb(255, 0, 0) = წითელი
        rgb(0, 255, 0) = მწვანე
        rgb(0, 0, 255) = ლურჯი

        იწერება ასე: rgb(red, green, blue)

        მინ და მაქს 0-დან 255-მდე.
    -->

    <!-- 
        HEX 
        HEX ფერის მოდელი გამოიყენება ფერების ჩასაწერად
        თექვსმეტობით სისტემაში.

        
        #ff0000 = წითელი
        #00ff00 = მწვანე
        #0000ff = ლურჯი

        HEX კოდი იწყება # სიმბოლოთი
        და შეიცავს 6 სიმბოლოს
        პირველი 2 = Red
        მეორე 2 = Green
        ბოლო 2 = Blue
    -->

    <!-- 
        განსხვავება RGB-სა და HEX-ს შორის:
        RGB ფერს წერს რიცხვებით: rgb(255, 0, 0)
        HEX ფერს წერს კოდით: #ff0000
    -->

    <!-- 
        HEX უკეთესია რადგან უფრო მოკლედ შეგვიძლია ფერის აღება
    -->
