<!--
EXTERNAL CSS

External CSS არის CSS - ის გამოყენების ისეთი მეთოდი,
როცა სტილები (style - ები) იწერება ცალკე .css ფაილში
და არა პირდაპირ HTML ფაილში.

მაგალითად:
index.html
style.css

ეს ნიშნავს, რომ HTML ფაილში გვაქვს მხოლოდ სტრუქტურა,
ხოლო დიზაინი და გაფორმება გადატანილია ცალკე CSS ფაილში.


1) INLINE CSS
- inline css იწერება პირდაპირ HTML ელემენტში
- ამისთვის ვიყენებთ style attribute - ს

მაგალითი:
<h1 style="color:red;">Hello</h1>

ანუ style პირდაპირ ელემენტში წერია.

უპირატესობა:
- მარტივი და სწრაფია პატარა ცვლილებისთვის

ნაკლი:
- კოდი არეული და ნაკლებად მოწესრიგებულია
- ბევრი ელემენტის გასტილვა რთულია


2) INTERNAL CSS
- internal css იწერება HTML ფაილის შიგნით
- ამისთვის ვიყენებთ <style> tag - ს
- ჩვეულებრივ იწერება <head> ნაწილში

მაგალითი:
<style>
    h1 {
        color: blue;
    }
</style>

უპირატესობა:
- ერთი HTML ფაილის გასტილვა მარტივია

ნაკლი:
- თუ რამდენიმე გვერდი გვაქვს, თითოეულში ცალ-ცალკე უნდა ჩავწეროთ css


3) EXTERNAL CSS
- external css იწერება ცალკე .css ფაილში
- შემდეგ ეს ფაილი უკავშირდება HTML ფაილს

მაგალითი:
style.css ფაილში:
h1 {
    color: green;
}

უპირატესობა:
- კოდი უფრო სუფთა და დალაგებულია
- ერთი css ფაილით შეგვიძლია რამდენიმე html ფაილის გასტილვა
- მუშაობა უფრო მარტივი და პროფესიონალურია

ნაკლი:
- საჭიროა html და css ფაილების სწორად დაკავშირება


HTML და CSS ფაილების დასაკავშირებლად ვიყენებთ <link> tag - ს

მაგალითი:

<link rel="stylesheet" href="style.css">

ეს კოდი იწერება <head> ნაწილში.

განმარტება:
rel="stylesheet"
- ნიშნავს, რომ ვუკავშირებთ სტილის ფაილს

href="style.css"
- ნიშნავს css ფაილის სახელს ან მისამართს


თუ გვაქვს:

1) index.html
2) style.css

მაშინ index.html - ში ვწერთ:

<head>
    <link rel="stylesheet" href="style.css">
</head>

ამის შემდეგ style.css ფაილში დაწერილი ყველა style
იმოქმედებს HTML ელემენტებზე.

Inline CSS -> იწერება პირდაპირ ელემენტში
Internal CSS -> იწერება HTML ფაილში <style> tag - ში
External CSS -> იწერება ცალკე .css ფაილში

ყველაზე მოწესრიგებული და კარგი პრაქტიკაა External CSS,
რადგან კოდი უფრო სუფთა, მარტივი და ორგანიზებულია.
-->
